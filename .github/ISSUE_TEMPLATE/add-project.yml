name: Add Project
description: Submit a new developer resource to the repository
title: "[Add] Project Name"
labels: ["new-project"]
body:
  - type: input
    id: name
    attributes:
      label: Project Name
      description: Official name of the project
    validations:
      required: true
  - type: input
    id: website
    attributes:
      label: Official Website
      description: URL to the project's official website
    validations:
      required: true
  - type: input
    id: documentation
    attributes:
      label: Documentation URL
      description: URL to the official documentation
    validations:
      required: true
  - type: input
    id: repository
    attributes:
      label: GitHub Repository
      description: URL to the GitHub repository
    validations:
      required: true
  - type: input
    id: category
    attributes:
      label: Category
      description: Which category does this project belong to?
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Brief description of the project
    validations:
      required: true
  - type: input
    id: license
    attributes:
      label: License
      description: Project license (e.g., MIT, Apache-2.0)
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Any other relevant details
