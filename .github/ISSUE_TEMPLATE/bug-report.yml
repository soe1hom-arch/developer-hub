name: Bug Report
description: Report an issue with the repository or its contents
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the issue
    validations:
      required: true
  - type: input
    id: project
    attributes:
      label: Affected Project
      description: Which project entry has the issue?
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should be correct?
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What is currently wrong?
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information
