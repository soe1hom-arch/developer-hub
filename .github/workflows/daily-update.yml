name: Daily Update

on:
  schedule:
    - cron: "0 0 * * *"   # Every day at 00:00 GMT
  workflow_dispatch:

jobs:
  daily-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt -q

      - name: Update GitHub stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/auto_update.py

      - name: Auto-discover (auto-commit jika lolos quality gate)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/auto_discover.py --max-per-category 5
          python scripts/auto_discover.py --commit

      - name: Auto-fix & validate
        run: python scripts/auto_fix.py

      - name: Rebuild search index
        run: python scripts/build_index.py

      - name: Commit & push ke main
        run: |
          git config user.name "Wandi"
          git config user.email "soe1hom-arch@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: daily auto-update $(date +'%Y-%m-%d')"
          git push origin main

      - name: Cek proposals pending
        run: |
          COUNT=$(ls .proposals/*.json 2>/dev/null | wc -l)
          echo "📋 $COUNT proposal(s) di .proposals/ menunggu review manual"
