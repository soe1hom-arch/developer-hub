name: Daily Update

on:
  schedule:
    - cron: "0 2 * * *"   # Every day at 02:00 UTC
  workflow_dispatch:

jobs:
  daily-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Update GitHub stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/auto_update.py

      - name: Commit & commit proposal entries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/auto_discover.py --max-per-category 5
          python scripts/auto_discover.py --commit

      - name: Validate all entries
        run: python scripts/validate.py

      - name: Validate pending proposals
        run: python scripts/validate.py --proposals

      - name: Rebuild search index
        run: python scripts/build_index.py

      - name: Commit changes
        run: |
          git config user.name "Wandi"
          git config user.email "soe1hom-arch@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: daily auto-update [skip ci]"
          git push
