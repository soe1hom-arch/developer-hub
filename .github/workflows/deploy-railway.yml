name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build index & validate
        run: |
          pip install -r scripts/requirements.txt -q
          python scripts/build_index.py
          python scripts/validate.py

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Railway CLI login & deploy
          npx --yes railway login --token "$RAILWAY_TOKEN"
          npx railway link 0f26eec2-56db-4e38-af83-c4f7616f325f
          npx railway up --detach
