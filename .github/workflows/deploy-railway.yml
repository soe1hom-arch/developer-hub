name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt uvicorn httpx

      - name: Build index & validate
        run: |
          python scripts/build_index.py
          python scripts/validate.py

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -n "$RAILWAY_TOKEN" ]; then
            npx railway login --token "$RAILWAY_TOKEN"
            npx railway up --service 0cb638c8-33bd-4244-8fa2-4d783179181a --detach
          else
            echo "⚠️  RAILWAY_TOKEN not set in GitHub secrets."
            echo ""
            echo "📖 Cara setup:"
            echo "   1. Buka https://railway.app/dashboard"
            echo "   2. Pilih project → Settings → Tokens"
            echo "   3. Generate New Token (Deploy token)"
            echo "   4. GitHub → Settings → Secrets → RAILWAY_TOKEN"
            exit 1
          fi
