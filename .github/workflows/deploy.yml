name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test build
        run: docker build -t developer-hub .
      - name: Run tests
        run: docker run --rm developer-hub python tests/test_all.py
