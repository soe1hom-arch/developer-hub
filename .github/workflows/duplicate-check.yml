name: Duplicate Detection

on:
  pull_request:
    paths:
      - "*.json"
      - "*/*.json"
  workflow_dispatch:

jobs:
  check-duplicates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt -q
      - name: Check for duplicate entries
        run: python scripts/duplicate_check.py
