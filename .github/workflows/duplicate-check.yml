name: Duplicate Detection

on:
  pull_request:
    paths:
      - "*.json"
      - "*/*.json"
  workflow_dispatch:

jobs:
  check-duplicates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt -q
      - name: Check for duplicate entries
        run: python3 -c "
import json, sys, re
from pathlib import Path
sys.path.insert(0, str(Path('.')))
from scripts.categories import CATEGORIES

def extract_repo_path(url):
    if not url or 'github.com' not in url:
        return None
    m = re.search(r'github\.com[:/]([\w.-]+)/([\w.-]+?)(?:\.git|/|\$)', url)
    if m:
        owner, repo = m.group(1), m.group(2)
        if repo and not repo.startswith('.') and owner != repo:
            return f'{owner.lower()}/{repo.lower()}'
    return None

seen_names = {}
seen_gh = {}
duplicates = []

for cat in CATEGORIES:
    d = Path('.') / cat
    if not d.exists():
        continue
    for f in sorted(d.glob('*.json')):
        try:
            data = json.loads(f.read_text())
            name = data.get('name', '').lower()
            gh_url = data.get('github_repository', '').rstrip('/')
            
            if name:
                if name in seen_names:
                    duplicates.append((seen_names[name], str(f), 'Name: \"' + name + '\"'))
                else:
                    seen_names[name] = str(f)
            
            repo_path = extract_repo_path(gh_url)
            if repo_path:
                if repo_path in seen_gh:
                    duplicates.append((seen_gh[repo_path], str(f), 'GitHub: ' + gh_url))
                else:
                    seen_gh[repo_path] = str(f)
        except Exception as e:
            print(f'Warning: {f}: {e}', file=sys.stderr)

if duplicates:
    print('Duplicate entries found:')
    for orig, dup, reason in duplicates:
        print(f'  {reason}')
        print(f'    -> {orig}')
        print(f'    -> {dup}')
    print(f'Total: {len(duplicates)} duplicate(s) found.')
    sys.exit(1)
else:
    print('No duplicates found.')
    print(f'  Checked {len(seen_names)} entries by name')
    print(f'  Checked {len(seen_gh)} entries by GitHub repo path')
"
