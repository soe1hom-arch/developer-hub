name: Health Check

on:
  schedule:
    - cron: "0 8 * * 0"  # Every Sunday at 8:00 UTC
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt
      - name: Validate all JSON files
        run: python scripts/validate.py
      - name: Comprehensive health check
        run: python scripts/health_check.py --report
      - name: Run AI categorization checks
        run: python scripts/ai_categorize.py --detect-deprecated --check-docs
      - name: Rebuild index
        run: python scripts/build_index.py
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: health-report
          path: reports/
