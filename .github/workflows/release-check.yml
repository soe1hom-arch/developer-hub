name: Release Check

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 6:00 UTC
  workflow_dispatch:

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt
      - name: Check for new releases
        run: |
          python3 -c "
          import json, urllib.request, os, sys
          from pathlib import Path

          repo_root = Path('.')
          # Check a few key repos for new releases via GitHub API
          repos_to_check = [
              ('facebook/react', 'frontend/react.json'),
              ('django/django', 'backend/django.json'),
              ('python/cpython', 'languages/python.json'),
              ('microsoft/TypeScript', 'languages/typescript.json'),
              ('rust-lang/rust', 'languages/rust.json'),
              ('golang/go', 'languages/go.json'),
              ('nodejs/node', 'web/nodejs.json'),
          ]

          for repo, json_path in repos_to_check:
              json_file = repo_root / json_path
              if not json_file.exists():
                  continue
              with open(json_file) as f:
                  data = json.load(f)
              current_version = data.get('latest_version', '')
              try:
                  api_url = f'https://api.github.com/repos/{repo}/releases/latest'
                  req = urllib.request.Request(api_url, headers={'User-Agent': 'DeveloperHub-CI', 'Accept': 'application/vnd.github+json'})
                  resp = urllib.request.urlopen(req, timeout=10)
                  release = json.loads(resp.read().decode())
                  latest = release.get('tag_name', '').lstrip('v')
                  if latest and latest != current_version:
                      print(f'⚠ New release for {repo}: {current_version} -> {latest}')
                      # Optionally update the file (with caution)
                      data['latest_version'] = latest
                      data['last_checked'] = data['last_updated'] = os.environ.get('NOW', '2026-07-11')
                      with open(json_file, 'w') as f:
                          json.dump(data, f, indent=2)
                      print(f'  Updated {json_path}')
              except Exception as e:
                  print(f'  Could not check {repo}: {e}')
          "
      - name: Rebuild index if updated
        run: python scripts/build_index.py
      - name: Commit updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add -A && git commit -m "Auto-update releases and metadata" && git push)
