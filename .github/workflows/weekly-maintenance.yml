name: Weekly Maintenance

on:
  schedule:
    - cron: "0 8 * * 0"  # Every Sunday at 08:00 UTC
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Full validation
        run: python scripts/validate.py

      - name: Comprehensive health check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/health_check.py --report

      - name: Scan for new releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/scrape_external.py --sources fdroid,termux,releases --max-items 10

      - name: Refresh discover proposals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/auto_discover.py --max-per-category 10
          python scripts/auto_discover.py --commit

      - name: Rebuild search index
        run: python scripts/build_index.py

      - name: Generate quality report
        run: python scripts/generate_report.py --summary

      - name: Commit changes
        run: |
          git config user.name "Wandi"
          git config user.email "soe1hom-arch@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: weekly maintenance [skip ci]"
          git push
