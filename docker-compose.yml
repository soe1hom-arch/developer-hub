version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - WORKERS=4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./website:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

  # Optional: auto-rebuild index periodically
  indexer:
    build: .
    profiles: ["tools"]
    command: python scripts/build_index.py
    volumes:
      - ./data:/app/data
