<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3ddc84"/>
      <stop offset="100%" style="stop-color:#1a8c4a"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>
  <!-- Background shield -->
  <rect x="10" y="10" width="100" height="100" rx="22" fill="url(#lg)" opacity="0.12"/>
  <rect x="10" y="10" width="100" height="100" rx="22" fill="none" stroke="url(#lg)" stroke-width="2" opacity="0.3"/>
  <!-- Antenna left -->
  <rect x="40" y="14" width="5" height="16" rx="2.5" fill="url(#lg2)"/>
  <!-- Antenna right -->
  <rect x="75" y="14" width="5" height="16" rx="2.5" fill="url(#lg2)"/>
  <!-- Head -->
  <rect x="25" y="28" width="70" height="62" rx="16" fill="url(#lg2)"/>
  <!-- Inner highlight -->
  <rect x="28" y="31" width="64" height="56" rx="14" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Eyes -->
  <ellipse cx="42" cy="56" rx="6" ry="7" fill="#0a0b0f"/>
  <ellipse cx="78" cy="56" rx="6" ry="7" fill="#0a0b0f"/>
  <!-- Eye shine -->
  <ellipse cx="44" cy="53" rx="2.5" ry="3" fill="rgba(255,255,255,0.6)"/>
  <ellipse cx="80" cy="53" rx="2.5" ry="3" fill="rgba(255,255,255,0.6)"/>
  <!-- Smile -->
  <path d="M 48 70 Q 60 80 72 70" fill="none" stroke="#0a0b0f" stroke-width="3.5" stroke-linecap="round"/>
</svg>
